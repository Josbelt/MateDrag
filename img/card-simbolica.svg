<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 1024" role="img" aria-labelledby="title desc">
  <title id="title">Tarjeta Simbólica</title>
  <desc id="desc">Tarjeta morada de la fase simbólica con operación matemática y botón jugar.</desc>
  <defs>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7e39d2"/>
      <stop offset="1" stop-color="#5b25a8"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#9b61e1"/>
      <stop offset="1" stop-color="#7440c9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#2d075e" flood-opacity=".36"/>
    </filter>
  </defs>

  <rect x="22" y="22" width="724" height="980" rx="72" fill="url(#edge)"/>
  <rect x="50" y="50" width="668" height="924" rx="54" fill="url(#card)" filter="url(#shadow)"/>
  <text x="384" y="174" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="96" font-weight="900" fill="#fff" stroke="#fff" stroke-width="2">SIMBÓLICA</text>

  <rect x="92" y="268" width="584" height="524" rx="30" fill="#fff"/>
  <text x="384" y="540" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="126" font-weight="900" fill="#06245a">2 × 3 = 6</text>

  <rect x="100" y="826" width="568" height="140" rx="36" fill="none" stroke="#fff" stroke-width="9"/>
  <text x="384" y="920" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="86" font-weight="900" fill="#fff">JUGAR</text>
</svg>
