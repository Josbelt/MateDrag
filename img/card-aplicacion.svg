      <path d="M105 28h160" stroke="#315d86" stroke-width="9" stroke-linecap="round"/>
    </g>
    <g transform="translate(118 250)">
      <rect x="0" y="0" width="62" height="62" rx="10" fill="#50d727" stroke="#08721d" stroke-width="7"/>
      <path d="M13 30l15 17 39-43" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M105 28h150" stroke="#315d86" stroke-width="9" stroke-linecap="round"/>
