<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 1024" role="img" aria-labelledby="title desc">
  <title id="title">Tarjeta Aplicación</title>
  <desc id="desc">Tarjeta azul de la fase aplicación con portapapeles y botón jugar.</desc>
  <defs>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#12aaff"/>
      <stop offset="1" stop-color="#0759d8"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#3af3ff"/>
      <stop offset="1" stop-color="#0874ff"/>
    </linearGradient>
    <linearGradient id="button" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#18d7ff"/>
      <stop offset="1" stop-color="#006fd8"/>
    </linearGradient>
    <linearGradient id="clip" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d9f4ff"/>
      <stop offset="1" stop-color="#7fa8c7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#052c80" flood-opacity=".38"/>
    </filter>
  </defs>

  <rect x="22" y="22" width="724" height="980" rx="72" fill="url(#edge)"/>
  <rect x="50" y="50" width="668" height="924" rx="54" fill="url(#card)" filter="url(#shadow)"/>
  <rect x="72" y="72" width="624" height="880" rx="44" fill="none" stroke="#20e8ff" stroke-width="9" opacity=".85"/>

