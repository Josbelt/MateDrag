      <path d="M34 44h50c6-35 58-35 64 0h50c14 0 24 10 24 24v60c0 14-10 24-24 24H34c-14 0-24-10-24-24V68c0-14 10-24 24-24z" fill="url(#clip)" stroke="#1b4872" stroke-width="9"/>
      <circle cx="116" cy="45" r="20" fill="#1b4872"/>
      <circle cx="116" cy="45" r="12" fill="#e6f7ff"/>
      <rect x="28" y="82" width="176" height="26" rx="8" fill="#9fc7df"/>
