<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 1024" role="img" aria-labelledby="title desc">
  <title id="title">Tarjeta Concreta</title>
  <desc id="desc">Tarjeta verde de la fase concreta con bloques y botón jugar.</desc>
  <defs>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d7e29"/>
      <stop offset="1" stop-color="#009b2a"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#8de12d"/>
      <stop offset="1" stop-color="#46b51c"/>
    </linearGradient>
    <linearGradient id="blueCube" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#45c6ff"/>
      <stop offset="1" stop-color="#0877bf"/>
    </linearGradient>
    <linearGradient id="yellowCube" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffe25a"/>
      <stop offset="1" stop-color="#ffa300"/>
