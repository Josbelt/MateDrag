<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 230" role="img" aria-labelledby="title desc">
  <title id="title">Ruta Numérica</title>
  <desc id="desc">Logo de Ruta Numérica con colores azul, verde y naranja.</desc>
  <defs>
    <linearGradient id="blueText" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#17a8ff"/>
      <stop offset="1" stop-color="#0747a8"/>
    </linearGradient>
    <linearGradient id="greenText" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#61d42d"/>
      <stop offset="1" stop-color="#238e16"/>
    </linearGradient>
    <linearGradient id="orangeText" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ff9f20"/>
      <stop offset="1" stop-color="#ff5b00"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="3" flood-color="#062a76" flood-opacity=".45"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <text x="72" y="90" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="86" font-weight="900" stroke="#ffffff" stroke-width="9" paint-order="stroke" letter-spacing="0">
      <tspan fill="url(#blueText)">Ru</tspan><tspan fill="url(#greenText)">t</tspan><tspan fill="url(#orangeText)">a</tspan>
    </text>
    <text x="68" y="174" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="86" font-weight="900" fill="#0747a8" stroke="#ffffff" stroke-width="9" paint-order="stroke" letter-spacing="0">Numérica</text>
  </g>

  <path d="M122 193c118 26 337 27 471-1" fill="none" stroke="#0874d9" stroke-width="24" stroke-linecap="round"/>
  <text x="360" y="202" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="25" font-weight="900" fill="#ffffff">¡Cada fase te lleva más lejos!</text>

  <g transform="translate(596 154)">
    <path d="M42 71c-19-27-30-45-30-62a30 30 0 0 1 60 0c0 17-11 35-30 62z" fill="#0874d9"/>
    <circle cx="42" cy="11" r="12" fill="#ffffff"/>
